<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Portal - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="animations.css">
</head>
<body>
    <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
        <div class="shape shape-5"></div>
    </div>

    <div class="login-container">
        <div class="glass-morphism login-card">
            <div class="login-header">
                <h1 class="text-center mb-3">
                    <span class="logo-icon">🏆</span>
                    <span class="logo-text">Sports Portal</span>
                </h1>
                <p class="text-center text-white-50">Welcome to your sports booking experience</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group mb-4">
                    <div class="input-group">
                        <span class="input-group-text glass-input-icon">
                            <i class="user-icon">👤</i>
                        </span>
                        <input type="text" class="form-control glass-input" id="username" placeholder="Enter username" required>
                    </div>
                </div>

                <div class="form-group mb-4">
                    <div class="input-group">
                        <span class="input-group-text glass-input-icon">
                            <i class="lock-icon">🔒</i>
                        </span>
                        <input type="password" class="form-control glass-input" id="password" placeholder="Enter password" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-glass-login w-100 mb-3">
                    <span class="btn-text">Login to Portal</span>
                    <span class="btn-icon">→</span>
                </button>

                <div class="demo-info text-center">
                    <small class="text-white-50">
                        <i class="info-icon">ℹ️</i> Demo: Use any credentials to login
                    </small>
                </div>
            </form>

            <div class="login-footer">
                <div class="social-login">
                    <p class="text-center text-white-50 mb-3">Or continue with</p>
                    <div class="d-flex justify-content-center gap-3">
                        <button class="btn btn-social glass-social-btn">
                            <span class="social-icon">📱</span>
                        </button>
                        <button class="btn btn-social glass-social-btn">
                            <span class="social-icon">🌐</span>
                        </button>
                        <button class="btn btn-social glass-social-btn">
                            <span class="social-icon">💬</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
