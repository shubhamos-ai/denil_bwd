<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Portal - Booking</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <div class="card header">
            <div>
                <button class="btn btn-secondary auto-width" onclick="goBack()">← Back to Dashboard</button>
            </div>
            <div>
                <h1><span id="sportIcon">🏓</span> Book <span id="sportName">Sport</span></h1>
            </div>
            <div>
                <strong>Role: <span id="userBadge">Player</span></strong>
            </div>
        </div>

        <div class="booking-layout">
            <div class="card booking-form">
                <h2>📅 Select Date & Time</h2>
                
                <div class="form-group">
                    <label>Choose Date:</label>
                    <input type="date" id="bookingDate">
                    <small>Available slots from today onwards</small>
                </div>

                <div class="form-group">
                    <label>Select Time Slot:</label>
                    <div style="display:flex;gap:5px;margin-bottom:10px;">
                        <button class="btn auto-width" onclick="filterTimeSlots('all')">All Slots</button>
                        <button class="btn btn-secondary auto-width" onclick="filterTimeSlots('morning')">Morning</button>
                        <button class="btn btn-secondary auto-width" onclick="filterTimeSlots('afternoon')">Afternoon</button>
                        <button class="btn btn-secondary auto-width" onclick="filterTimeSlots('evening')">Evening</button>
                    </div>
                    <select id="timeSlotSelect">
                        <option value="">Select a time slot...</option>
                    </select>
                </div>
            </div>

            <div class="card booking-sidebar">
                <h2>📝 Booking Details</h2>
                
                <div class="form-group">
                    <label>Duration:</label>
                    <select id="duration">
                        <option value="1">1 hour</option>
                        <option value="2">2 hours</option>
                        <option value="3">3 hours</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Number of Players:</label>
                    <div class="row">
                        <button type="button" class="btn btn-secondary auto-width" onclick="changePlayers(-1)">-</button>
                        <input type="number" id="players" min="1" max="20" value="2" readonly style="width: 80px; text-align: center;">
                        <button type="button" class="btn btn-secondary auto-width" onclick="changePlayers(1)">+</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>Special Requests:</label>
                    <textarea id="specialRequests" rows="3" placeholder="Any special requirements..."></textarea>
                </div>

                <div class="form-group" style="background:white;padding:15px;border-radius:4px;">
                    <h3>Booking Summary</h3>
                    <div class="summary-item"><span>Sport:</span> <strong id="summarySport">-</strong></div>
                    <div class="summary-item"><span>Date:</span> <strong id="summaryDate">-</strong></div>
                    <div class="summary-item"><span>Time:</span> <strong id="summaryTime">-</strong></div>
                    <div class="summary-item"><span>Duration:</span> <strong id="summaryDuration">-</strong></div>
                    <div class="summary-item"><span>Players:</span> <strong id="summaryPlayers">-</strong></div>
                    <div class="summary-item" style="border-top:1px solid #d1d5db;padding-top:10px;margin-top:10px;margin-bottom:0;">
                        <span>Estimated Cost:</span> <strong id="totalCost" style="color:var(--primary-color)">$0</strong>
                    </div>
                </div>

                <button class="btn btn-secondary w-100" onclick="goBack()" style="margin-bottom:5px;">Cancel</button>
                <button class="btn w-100" onclick="confirmBooking()">✓ Confirm Booking</button>
            </div>
        </div>

    </div>

    <!-- Success Modal custom element -->
    <div id="successModal" class="modal">
        <div class="modal-content card text-center">
            <h1>🎉</h1>
            <h2>Booking Confirmed!</h2>
            <p>Your sport booking has been successfully confirmed.</p>
            <div id="successDetails" style="text-align: left; margin: 15px 0;"></div>
            <button class="btn auto-width" onclick="goBack()">Back to Dashboard</button>
            <button class="btn btn-secondary auto-width" onclick="newBooking()">Book Another</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
