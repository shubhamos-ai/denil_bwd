<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Successful - Sports Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="animations.css">
</head>
<body>
    <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
        <div class="shape shape-5"></div>
    </div>

    <div class="success-container">
        <div class="glass-morphism success-card">
            <div class="success-header">
                <div class="success-icon-large">
                    <div class="success-animation">🎉</div>
                </div>
                <h1 class="success-title">Booking Successful!</h1>
                <p class="success-subtitle">Your sport booking has been confirmed</p>
            </div>

            <div class="success-content">
                <div class="booking-details-success" id="bookingDetails">
                    <!-- Booking details will be populated here -->
                </div>

                <div class="success-info">
                    <div class="info-item">
                        <span class="info-icon">📧</span>
                        <span class="info-text">Confirmation email sent to your registered email</span>
                    </div>
                    <div class="info-item">
                        <span class="info-icon">📱</span>
                        <span class="info-text">SMS notification will be sent 24 hours before your booking</span>
                    </div>
                    <div class="info-item">
                        <span class="info-icon">🔄</span>
                        <span class="info-text">You can cancel or reschedule up to 2 hours before</span>
                    </div>
                </div>

                <div class="success-actions">
                    <button class="btn btn-glass-success me-2" onclick="viewBookings()">
                        <span class="btn-icon">📋</span>
                        View My Bookings
                    </button>
                    <button class="btn btn-glass-primary" onclick="bookAnother()">
                        <span class="btn-icon">➕</span>
                        Book Another Sport
                    </button>
                </div>

                <div class="success-footer">
                    <button class="btn btn-back-dashboard" onclick="goToDashboard()">
                        <span class="btn-icon">🏠</span>
                        Back to Dashboard
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
    <script>
        // Initialize success page
        document.addEventListener('DOMContentLoaded', () => {
            const bookingDetails = document.getElementById('bookingDetails');
            const latestBooking = JSON.parse(localStorage.getItem('latestBooking') || '{}');
            
            if (latestBooking.id && bookingDetails) {
                const sportIcons = {
                    'pickleball': '🏓',
                    'volleyball': '🏐',
                    'football': '🏈',
                    'cricket': '🏏',
                    'tennis': '🎾'
                };
                
                bookingDetails.innerHTML = `
                    <div class="glass-morphism booking-summary-card">
                        <div class="booking-header">
                            <span class="sport-icon-large">${sportIcons[latestBooking.sport] || '🏆'}</span>
                            <h3>${latestBooking.sport?.charAt(0).toUpperCase() + latestBooking.sport?.slice(1) || 'Sport'}</h3>
                        </div>
                        <div class="booking-info-grid">
                            <div class="info-row">
                                <span class="info-label">Booking ID:</span>
                                <span class="info-value">#${latestBooking.id}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Date:</span>
                                <span class="info-value">${latestBooking.date || 'N/A'}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Time:</span>
                                <span class="info-value">${latestBooking.time || 'N/A'}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Duration:</span>
                                <span class="info-value">${latestBooking.duration || 'N/A'} hour(s)</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Players:</span>
                                <span class="info-value">${latestBooking.players || 'N/A'}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Total Cost:</span>
                                <span class="info-value cost-highlight">$${(latestBooking.duration || 1) * (latestBooking.players || 1) * 10}</span>
                            </div>
                        </div>
                        <div class="booking-status">
                            <span class="status-badge confirmed">✓ Confirmed</span>
                        </div>
                    </div>
                `;
            }
        });

        // Global functions
        function viewBookings() {
            window.location.href = 'dashboard.html';
        }

        function bookAnother() {
            window.location.href = 'dashboard.html';
        }

        function goToDashboard() {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
