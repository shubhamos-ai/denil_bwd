<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Successful - Sports Portal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container text-center">
        <div class="card login-card" style="max-width: 600px;">
            <div class="header" style="justify-content: center;">
                <div>
                    <h1 style="font-size: 3rem;">🎉</h1>
                    <h1>Booking Successful!</h1>
                    <p>Your sport booking has been confirmed</p>
                </div>
            </div>

            <div id="bookingDetails">
                <!-- Booking details will be populated here -->
            </div>

            <div class="info-item text-center">
                <p>📧 Confirmation email sent to your registered email</p>
                <p>📱 SMS notification will be sent 24 hours before your booking</p>
                <p>🔄 You can cancel or reschedule up to 2 hours before</p>
            </div>

            <div style="margin-top:20px;display:flex;gap:10px;justify-content:center;">
                <button class="btn auto-width" onclick="viewBookings()">📋 View My Bookings</button>
                <button class="btn btn-secondary auto-width" onclick="bookAnother()">➕ Book Another Sport</button>
            </div>
            
            <div style="margin-top:20px;">
                <button class="btn btn-secondary" onclick="goToDashboard()">🏠 Back to Dashboard</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const bookingDetails = document.getElementById('bookingDetails');
            const latestBooking = JSON.parse(localStorage.getItem('latestBooking') || '{}');
            
            if (latestBooking.id && bookingDetails) {
                const sportIcons = {
                    'pickleball': '🏓',
                    'volleyball': '🏐',
                    'football': '🏈',
                    'cricket': '🏏',
                    'tennis': '🎾'
                };
                
                bookingDetails.innerHTML = `
                    <div style="text-align:left; background: var(--bg-color); padding: 15px; border-radius: 4px; border: 1px solid #d1d5db; margin-bottom: 20px;">
                        <h3 style="border-bottom: 1px solid #d1d5db; padding-bottom: 10px; margin-bottom: 10px;">
                            ${sportIcons[latestBooking.sport] || '🏆'} ${latestBooking.sport?.charAt(0).toUpperCase() + latestBooking.sport?.slice(1) || 'Sport'}
                        </h3>
                        <p><strong>Booking ID:</strong> #${latestBooking.id}</p>
                        <p><strong>Date:</strong> ${latestBooking.date || 'N/A'}</p>
                        <p><strong>Time:</strong> ${latestBooking.time || 'N/A'}</p>
                        <p><strong>Duration:</strong> ${latestBooking.duration || 'N/A'} hour(s)</p>
                        <p><strong>Players:</strong> ${latestBooking.players || 'N/A'}</p>
                        <p><strong>Total Cost:</strong> $${(latestBooking.duration || 1) * (latestBooking.players || 1) * 10}</p>
                        <p style="color:var(--primary-color);font-weight:bold;margin-top:10px;">✓ Confirmed</p>
                    </div>
                `;
            }
        });

        function viewBookings() { window.location.href = 'dashboard.html'; }
        function bookAnother() { window.location.href = 'dashboard.html'; }
        function goToDashboard() { window.location.href = 'dashboard.html'; }
    </script>
</body>
</html>
